<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Loot Bhai Live</title>
<style>*{box-sizing:border-box}body{margin:0;background:#09090d;color:#fff;font-family:system-ui}.w{max-width:800px;margin:auto;padding:18px 12px 80px}.top{display:flex;justify-content:space-between;align-items:center}.logo{font-size:26px;font-weight:900}.g{color:#39ff88}.hero,.deal,.msg{background:#16161e;border:1px solid #2b2b38;border-radius:20px}.hero{padding:20px;margin:18px 0}.hero h1{margin:0 0 8px;font-size:30px}.hero p,.muted{color:#aaa}.filters{display:flex;gap:8px;overflow:auto;margin:12px 0}.filters button{white-space:nowrap;background:#1b1b24;color:#fff;border:1px solid #333343;padding:10px 13px;border-radius:999px}.filters .on{background:#39ff88;color:#07130c;font-weight:900}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.deal{overflow:hidden}.pic{height:155px;background:#fff}.pic img{width:100%;height:100%;object-fit:contain}.info{padding:12px}.store{font-size:11px;color:#39ff88;font-weight:800}.title{height:40px;overflow:hidden;font-weight:800;margin:5px 0}.price{font-size:20px;font-weight:900}.mrp{text-decoration:line-through;color:#999;font-size:12px}.off{background:#ff4969;padding:4px 7px;border-radius:7px;font-size:11px;font-weight:900}.buy{display:block;text-align:center;text-decoration:none;background:#39ff88;color:#06130b;font-weight:900;padding:11px;border-radius:12px;margin-top:10px}.msg{padding:25px;text-align:center}.spin{padding:40px;text-align:center;color:#aaa}@media(max-width:390px){.pic{height:130px}}</style></head>
<body><div class="w"><div class="top"><div class="logo">🔥 Loot <span class="g">Bhai</span></div><b class="g">● LIVE</b></div>
<div class="hero"><h1>Real feed lo unna products matrame. 💸</h1><p>Price drop & high discount deals automatically sort avuthayi.</p></div>
<div class="filters"><button class="on" data-f="all">🔥 All</button><button data-f="100">₹100 Below</button><button data-f="70">70%+ OFF</button><button data-f="90">90%+ OFF</button></div>
<div id="app" class="spin">Live feed checking...</div></div>
<script>
let all=[],filter="all"; const app=document.getElementById("app");
document.querySelectorAll("button[data-f]").forEach(b=>b.onclick=()=>{document.querySelectorAll("button[data-f]").forEach(x=>x.classList.remove("on"));b.classList.add("on");filter=b.dataset.f;render()});
function money(n){return "₹"+Number(n).toLocaleString("en-IN")}
function render(){let d=all.filter(x=>filter==="all"||filter==="100"&&x.price<=100||filter==="70"&&x.off>=70||filter==="90"&&x.off>=90);
if(!d.length)return app.innerHTML='<div class="msg">Ee filter lo live loot ledu.</div>';
app.className="grid";app.innerHTML=d.map(x=>`<article class="deal"><div class="pic">${x.image?`<img loading="lazy" src="${x.image}" onerror="this.style.display='none'">`:""}</div><div class="info"><span class="off">${x.off?x.off+"% OFF":"LIVE"}</span><div class="store">${x.store}</div><div class="title">${x.title}</div><span class="price">${money(x.price)}</span> ${x.mrp?`<span class="mrp">${money(x.mrp)}</span>`:""}<a class="buy" href="${x.url}" target="_blank" rel="sponsored noopener">BUY NOW ↗</a></div></article>`).join("")}
fetch("/api/deals").then(r=>r.json()).then(j=>{if(!j.configured){app.className="";app.innerHTML='<div class="msg"><b>🔥 Live engine ready.</b><p class="muted">Vercel/Render environment lo <b>PRODUCT_FEED_URL</b> ki authorised Admitad XML product feed URL add chey. App automatic ga real products load chesthadi.</p></div>';return} all=j.deals||[];render()}).catch(e=>app.innerHTML='<div class="msg">Feed load error.</div>');
setInterval(()=>location.reload(),15*60*1000);
</script></body></html>
